name: Shadow Alpha CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shadow-alpha-api

    env:
      # Minimal env vars required for tests (SQLite in-memory)
      SECRET_KEY: "ci-test-secret-key-do-not-use-in-production-32chars"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      ENVIRONMENT: "testing"
      REDIS_URL: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: shadow-alpha-api/requirements.txt

      # asyncpg needs libpq to compile on Linux
      - name: Install system dependencies
        run: sudo apt-get update -q && sudo apt-get install -y -q libpq-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ --select E,F,W --ignore E501

  # ── Quant Model Tests ─────────────────────────────────────────────────────
  quant-test:
    name: Quant Model Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shadow-alpha-quant

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: shadow-alpha-quant/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify all models import
        run: |
          python -c "
          from quant import ActuarialShieldModel, CopyTradingScorer, RiskMetricsCalculator, EVCalibrator
          print('All models import OK ✅')
          "

  # ── Frontend Build ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shadow-alpha-web

    env:
      # Required at build time for Next.js static analysis
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      NEXT_PUBLIC_APP_NAME: "Shadow Alpha"
      NODE_ENV: "production"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: shadow-alpha-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

  # ── Deploy (only on main push, after all checks pass) ────────────────────
  deploy:
    name: Deploy to Production
    needs: [backend-test, quant-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "🚀 All checks passed — ready for deployment!"
        # TODO: Add deployment steps (Docker push to registry, SSH to server, etc.)
        # Examples:
        #   - docker build + push to GitHub Container Registry
        #   - Deploy to Railway/Render via their CLI
        #   - SSH into VPS and run docker compose pull && docker compose up -d
