<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <style>
        .signature-container {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: #F0F0F5;
            background-color: #0F0F14;
            padding: 15px;
            border-radius: 4px;
            max-width: 500px;
        }

        .company-name {
            font-weight: bold;
            color: #C9A84C;
            font-size: 16px;
        }

        .tagline {
            font-size: 13px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .links a {
            color: #00E676;
            text-decoration: none;
            margin-right: 10px;
        }

        .divider {
            border-top: 1px solid #333;
            margin: 15px 0;
        }

        .disclaimer {
            font-size: 11px;
            color: #888;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <div class="signature-container">
        <div class="company-name">Shadow Alpha | contact@shadowalpha.io</div>
        <div class="tagline">Plateforme d'échange de positions P2P & tontines digitales</div>

        <div class="links">
            <a href="https://shadowalpha.io">shadowalpha.io</a> |
            <a href="#">LinkedIn</a> |
            <a href="#">X</a> |
            <a href="https://t.me/ShadowAlphaOfficial">Telegram</a>
        </div>

        <div class="divider"></div>

        <div class="disclaimer">
            Ce message est confidentiel. Shadow Alpha ne sollicite jamais de transferts d'argent par email.<br>
            En cas de doute: <a href="mailto:support@shadowalpha.io" style="color:#C9A84C;">support@shadowalpha.io</a>
        </div>
    </div>

</body>

</html>
