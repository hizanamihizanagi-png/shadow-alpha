version: "3.9"

services:
  # ── Backend API ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: shadow-alpha-api
    ports:
      - "8000:8000"
    env_file:
      - shadow-alpha-api/.env
    environment:
      - DATABASE_URL=sqlite:///./shadow_alpha.db
      - ENVIRONMENT=development
    volumes:
      - ./shadow-alpha-api:/app
      - ./shadow-alpha-quant:/quant
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend Web ─────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: shadow-alpha-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000/v1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx Reverse Proxy (Production) ─────────────
  nginx:
    image: nginx:alpine
    container_name: shadow-alpha-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    profiles:
      - production

volumes:
  api-data:
